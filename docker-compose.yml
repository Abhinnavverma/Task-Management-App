version: '3.8'

services:
    postgres:
        image: postgres:15-alpine
        container_name: taskmanager-db
        restart: always
        env_file:
            - ./backend/.env
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - '5433:5432'
        volumes:
            - pg-data:/var/lib/postgresql/data

volumes:
    pg-data:
